body:
  text: 褚氏遺書受形本氣平脈津潤分體精血除疾審微辨書問子男子之合二精交暢陰血先至陽精後衝血間裏精精入為骨而男形成矣陽精先入陰血後參精間裏血血入為本而女形成矣陽氣聚面故男子面重溺死者必伏陰氣聚背故女子背重溺死者必仰走獸溺死者伏仰皆然陰陽均至非男非女之身精血散分駢胎品胎之兆父少母老産女必亡母壯父衰生男必弱古之良子首察乎此補羸滋血女則壯脾補弱男則壯脾節次羸女宜近時而嫁弱男宜待壯而婚此疾外所務之本不可不察也天地之氣周于一年人身之氣周于一日人身陽氣以子中由左足而上循左股左手指左肩左腦橫過右腦右肩右臂手指脅足則又子中矣陰氣以午中自右手心通右臂右臂橫過右臂左肩左脅左足外腎左足左脅則又午中矣陽氣所歷充滿周流陰氣上不過腦下不遺趾二氣之行晝夜不息中外必遍一為痰積壅塞則痰疾生焉醫方證候統紀浩繁詳其本源疾積虛耳或痰聚上或積留中遏氣之留難于流轉則上氣逆上下氣鬱下臟腑失常形骸受害暨乎氣本衰弱運轉艱遲或有不周血亦偏滯風溼寒暑乘間襲之所生痰疾與痰積同凡人之生熱而汗産而易二便順利則氣之通也陽虛不能運陰氣無陰氣以清其陽則陽獨治而為熱陰虛不能運陽氣無陽氣以和其陰則陰獨治而為寒脾以養氣肺以通氣腎以泄氣心以役氣凡臟有五肝獨不與在時為春春若不養不通不泄不役而氣常生心虛則氣入而為蕩肺虛則氣入而為喘肝虛則氣入而目昏腎虛則氣入而腰疼四虛氣入脾獨不與受食不化氣將自微安能有餘以入其虛嗚呼茲謂氣之名理歟脈分兩手手分三部隔尺寸者命之曰關去肘度尺曰尺關前一寸為寸左手之寸極上右手之尺極下男子陽順而下生上故極下之地右手之尺為受命之根本如天地未分元氣渾沌也既受命矣萬物從土而出惟脾為先故尺上之關為脾脾土生金故關土之寸為肺肺金生水故自右手之寸越左手之尺為腎腎水生木故右手尺上之關為肝肝木生火故關上之寸為心女子陰逆自上生下故極上之地左手之寸為受命之根本既受命矣萬物從土而出惟脾為先故左手寸下之關為脾脾土生金故關下之尺為肺肺金生水故左手之尺越右手之寸為腎腎水生木故右手寸下之關為肺肺木生火故關下之尺為心男子右手尺脈常弱初生微眇之氣也女子尺脈常強心火盛也非男非女之身感以婦人則男脈應疹動以男子則女脈順指不察乎此難與言醫同化五穀故胃為脾府而脈從脾同氣通泄故大腸為肺府而脈從肺同主精血故膀胱為腎府而腎脈從腎同感交合故小腸為心府而脈從心同以脈為竅故膽為肝府而脈從肝澄生當後世傳其言而已若初決其祕發悟後人者非至神乎體修長者脈疏形侏儒者脈蹙肥人如沉而正沉者愈沉瘦人如浮而正浮者愈浮未明斯理曷愈衆疾表裏多名呼吸定至抑皆末也世俗共傳茲得略云爾天地定位而上位乎中天地通氣而水氣蒸達土潤膏滋雲興雨降而百物生化人肖天地亦有水焉在上為疾伏皮為血在下為精從毛竅出為汗從腸腹出為瀉從瘡口出為水痰盡死精竭死汗枯死瀉極死從瘡口出不止乾即死至于血充目則視明充耳則聽聰充四肢則充動強充肌膚則身色白清則黑去則黃外熱則赤內熱則上蒸喉或下蒸大腸為小竅喉有竅則咳殺人腸有竅則便血殺人便血猶可止凝血不易醫後不停止髮泌咳血滲人喉愈滲愈咳愈咳愈滲飲溲溺則百不一死服寒涼則百不一生血雖陰類運之者其和陽乎耳因鼻口陰尻竅也雙乳外腎關也齒髮爪甲餘也枝指旁趾附也養耳力者常飽養目力者常順養臂指者常曲伸養皮趾者常步履夏臟宜涼冬臟宜溫背陰肢末雖夏宜涼胸色心火雖冬難熱熱作腫而竅塞血不行而肢廢餘有消長無疾痛附有疾痛無生死關有生死疾痛無消長有消長疾痛生死者痛而已飲食五味養髓骨肉血肌膚毛髮男子為陽陽中必有陰陰之中數八故一八而陽精升二八而陽精溢女子為陰陰中必有陽陽之中數七故一七而陰血升二七而陰血溢陽精陰血皆飲食五味之實秀也方其升也智慮開明齒牙更始髮黃者黑筋弱者強概其溢也凡充身肢體手足耳目之餘雖針養之瀝無有不下凡與形消父母者以其常于父母之身無不歷也是以父一體廢則子一肢不肖其母一目虧則子一目不肖其母然雌烏牝獸無天癸而成胎者何也鳥獸精血往來尾間也精未通而御女以通精則五體有不滿之處異日有難狀之疾陰已痿而思色以發其精則精不出內欺小便道澀而為淋也精耗而後竭之則大小便道牽疼愈疼則愈欲大小便愈便則愈疼女人天癸既至踰十年無男子合則不調未踰十年思男子合亦不調則舊血不出新血誤行或清而如骨或度而之腫或雖合而男子令男子多則歷枯虛人産乳衆則血枯殺人觀其精血思過半矣除疾之道極其候證詢其嗜好察致疾之由來觀而人之所患則勞其病之始終也勞其病矣外病療內上病救下辨病藏之虛實通病藏之母子相其老壯酌其淺深以制其劑而十全上巧至焉至劑獨味為上二味次之多品為下酸通骨甘解毒苦去熱醎道下心發沸當驗之藥未驗切戒亟投大熱既去餘勢不宜再藥修而肥者劑豐羸而弱者藥減用藥如用兵用醫如用將善用兵者馬有車之功善用藥者姜有桂之效知其知兵以軍付之用將之道也知其知伎以生付之用醫之道也世無難治之疾有不善治之醫藥無難代之品有不善代之人民中絶命斷可識矣疾有誤涼而得今證有似是而實非差之毫釐損其壽命乳票經三氣篇曰乾痛有時當為獨産餘刺變皆為熱諸冷皆為即熱則先涼藏冷則先溫血腸疾篇曰乾痛有時當為蟲産餘刺變皆痛腫傷寒篇曰傷風時疫濕暑宿痰作虐作疼傷寒俱類時人多瘧宜防為瘧時人多疹宜防作疹春瘟夏疫內證先出中濕中暑試以答朮殺之發散劑吐汗下俱此至證號宿痰失導必役廢嗟呼病有微而殺人勢有重而易治精微區別天下之良工哉尹彥成問曰五運六氣是耶非耶曰大撓作甲子歲冬至于甲子月相為甲子日夜半為甲子時值歲月日時積一十百千萬一亦有條而不紊色配以立以五方皆人所為也歲月日時甲子乙丑次及天地五行寒暑風雨倉卒而變人嬰所氣疾作于身氣難預期故疾難預定氣非人為故疾難人測推驗多奸拯救易誤俞扁弗議淳華未稽吾未見其氣也曰素問之書成于黃岐運氣之宗起于素問將古聖哲妄邪曰尼父刪經三墳猶廢肩鵲盧出盧醫遂多尚有黃岐之醫籍乎有說無方由漢而下有方無說說不幸理方不違義維出後書之託名于聖哲也曰然則諸書不足信耶曰由漢時而後學亦是涼書師固知君子之言不求貪朽然于武成之策亦取二三曰居今之世為古之工亦有道乎曰師友良醫因而言識變觀省舊典假筌以求魚博涉知病多診識脈屢用達藥則何愧于古人建平王妃姬等皆麗而無子擇良家子未笄女人御又無子問曰求男有道乎澄對之曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆用陰陽氣完時而後交合則交而孕孕而育育而為子堅壯強壽今未笄之女天癸始至以近男也陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多易婦人謀易宮府有男之道也王曰善未再期生三男夫老陽遇少陰老陰遇少陽有一子之道也
