front:
  text: 褚氏遺書䟦右褚澄遺書一卷初得蕭氐父子䕶其石而其書始全繼得僧義堪筆之紙而其書始存今得劉繼先鋟之木而其書始傳亦可謂多幸矣澄字彦道河南陽翟人宋武帝之甥尚書左僕射湛之之子盧江公主之夫齊太宰侍中録尚書公淵之弟仕宋自駙馬都尉遍歴清顯仕齊至侍中領右軍將軍永明元年卒南史云永元元年卒誤也東昏侯立其女為皇后追贈金紫光禄大夫實永元元年去其卒時已七十年矣遺書題其贈官豈蕭廣得其槨石考之史傳而附題於前乎初齊髙帝愛子豫章王嶷自江陵赴都得疾日臻帝憂形於色乃大赦天下聞澄𫝊楊淳秘方召澄治立愈帝喜甚擢澄左民尚書以寵之其守呉郡也民有李道念以公事至郡澄遙見謂曰汝有竒疾道念曰某得冷疾五年矣澄胗其脈曰非冷也由多食雞子所致可煮蘓一斗服之即吐物如升許涎裹之動抉涎出視乃一雞雛翅距已具而能走澄曰未也盍服其餘藥從之凡吐十三枚疾乃瘳其妙皆此類也是書幽𦕈簡切多前人所未發而豈徒哉問子篇稱建平王當是澄之妻之姪景素其生子六即延齡延年輩云嘉泰元年日南至甘泉寄士丁介䟦
