front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0011_WYG_001-1a, image: WYG0734/WYG0734-0543c.png}
body:
  text: 褚氏遺書齊褚澄撰受形男女之合二情交暢隂血先至陽精後衝血開裹精精入為骨而男形成矣陽精先入隂血後參精開裹血血入居本而女形成矣陽氣聚面故男子面重溺死者必伏隂氣聚背故女子背重溺死者必仰走獸溺死者伏仰皆然隂陽均至非男非女之身精血散分駢胎品胎之兆父少母老産女必羸母壯父衰生男必弱古之良工首察乎此補羸女先養血壮脾補弱男則壯脾節色羸女冝及時而嫁弱男冝待壯而婚此疾外所務之本不可不察也本氣天地之氣周於一年人身之氣周於一日人身陽氣以子中自左足而上循左股左手指左肩左腦横過右腦右肩右臂手指脇足則又子中矣隂氣以午中自右手心通右臂右肩横過左肩左臂左脇左足外腎右足右脇則又午中矣陽氣所歴充滿周流隂氣上不過腦下遺指趾二氣之行晝夜不息中外必徧一為痰積壅塞則疢疾生焉疾證醫候統紀浩繁詳其本源痰積虛耳或痰聚上或積留中遏氣之流艱於流轉則上氣逆上下氣鬱下臟府失常形骸受害暨乎氣本衰弱運轉艱遲或有不周血亦偏滯風濕寒暑乗間襲之所生痰疾與痰積同凡人之生熱而汗産而易二便順利則氣之通也陽虛不能運隂氣無隂氣以清其陽則陽獨治而為熱隂虚不能運陽氣無陽氣以和其隂則隂獨治而為厥脾以養氣肺以通氣腎以泄氣心以役氣凡臟有五肝獨不與在時為春在常為仁不養不通不泄不役而氣常生心虛則氣入而為蕩肺虛則氣入而為喘肝虚則氣入而目昏腎虚則氣入而腰疼四虚氣入脾獨不與受食不化氣將日㣲安能有餘以入其虚烏乎兹謂氣之名理與平脈脈分兩手手分三部隔寸尺者命之曰闗去肘度尺曰尺闗前一寸為寸左手之寸極上右手之尺極下男子陽順自下生上故極下之地右手之尺為受命之根本如天地未分元氣渾沌也旣受命矣萬物從土而出惟脾為先故尺上之闗為脾脾土生金故闗上之寸為肺肺金生水故自右手之寸越左手之尺為腎腎水生木故左手尺上之關為肝肝木生火故闗上之寸為心女子隂逆自上生下故極上之地左手之寸為受命之根本旣受命矣萬物從土而出惟脾為先故左手寸下之闗為脾脾土生金故闗下之尺為肺肺金生水故左手之尺越右手之寸為腎腎水生木故右手寸下之關為肝肝木生火故闗下之尺為心男子右手尺脈常弱初生㣲𦕈之氣也女子尺脈常強心火之位也非男非女之身感以婦人則男脈應胗動以男子則女脈順指不察乎此難與言醫同化五穀故胃為脾府而脈從脾同氣通泄故大腸為肺府而脈從肺同主精血故膀胱為腎府而脈從腎同感交合故小腸為心府而脈從心同以脈為竅故膽為肝府而脈從肝澄生當後世傳其言而已爾初决其秘發悟後人者非至神乎體脩長者脈疏形侏儒者脈蹙肥人如沉而正沉者愈沉瘦人如浮而正浮者愈浮未燭斯理曷愈衆疾表裏多名呼吸定至抑皆末也世俗並𫝊兹得略云爾津潤天地定位而水位乎中天地通氣而水氣蒸達土潤膏滋雲興雨降而百物生化人肖天地亦有水焉在上為痰伏皮為血在下為精從毛竅出為汗從腹腸出為㵼從瘡口出為水痰盡死精竭死汗枯死㵼極死水從瘡口出不止乾即死至於血充目則視明充耳則聽聰充四肢則舉動強充肌膚則身色白漬則黒去則黄外熱則赤内熱則上蒸喉或下蒸大腸為小竅喉有竅則咳血殺人腸有竅則便血殺人便血猶可止咳血不易醫喉不停物毫髪必咳血滲入喉愈滲愈咳愈咳愈滲飲溲溺則百不一死服寒凉則百不一生血雖隂類運之者其和陽乎分體耳目鼻口隂尻竅也臂股指趾肢也雙乳外腎關也齒髪爪甲餘也枝指旁趾附也養耳力者常飽養目力者常瞑養臂指者常屈伸養股趾者常步履夏臟宜凉冬臟宜溫背隂肢末雖夏宜温胸包心火雖冬難熱熱作腫而竅塞血不行而肢廢餘有消長無疾痛附有疾痛無生死關有生死疾痛無消長有消長疾痛生死者疣瘤而已精血飲食五味養髓骨肉血肌膚毛髪男子為陽陽中必有隂隂之中數八故一八而陽精升二八而陽精溢女子為隂隂中必有陽陽之中數七故一七而隂血升二七而隂血溢陽精隂血皆飲食五味之實秀也方其升也智慮開明齒牙更始髪黄者黒筋弱者強暨其溢也凡充身肢體手足耳目之餘雖針芥之瀝無有不下凡子形肖父母者以其精血嘗於父母之身無所不歴也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母然雌鳥牝獸無天癸而成胎者何也鳥獸精血往來尾閭也精未通而御女以通其精則五體有不滿之處異日有難狀之疾隂已痿而思色以降其精則精不出内敗小便道澁而為淋精已耗而復竭之則大小便道牽疼愈疼則愈欲大小便愈便則愈疼女人天癸旣至踰十年無男子合則不調未踰十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而之腫或雖合而難子合男子多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣除疾除疾之道極其候證詢其嗜好察致疾之由來觀時人之所患則窮其病之始終矣窮其病矣外病療内上病救下辯病藏之虚實通病藏之母子相其老壮酌其淺深以制其劑而十全上功至焉制劑獨味為上二味次之多品為下酸通骨甘解毒苦去熱鹹導下辛發滯當騐之藥未騐切戒亟投大勢旣去餘勢不宜再藥脩而肥者飲劑豐羸而弱者受藥减用藥如用兵用醫如用將善用兵者徒有車之功善用藥者薑有桂之效知其才智以軍付之用將之道也知其方伎以生付之用醫之道也世無難治之疾有不善治之醫藥無難代之品有不善代之人民中絶命㫁可識矣審微疾有誤凉而得冷證有似是而實非差之毫釐損其壽命浮栗經二氣篇曰諸熱皆為瀉諸冷皆為積熱則先凉臟冷則先溫血腹疾篇曰乾痛有時當為蟲産餘剰痛皆變腫傷寒篇曰傷風時疫濕暑宿痰作瘧作疹俱類傷寒時人多瘧宜防為瘧時人多疹宜防作疹春瘟夏疫内證先出中濕中暑試以苓术投之發散劑吐汗下俱至此證號宿痰失導必肢廢嗟乎病有微而殺人勢有重而易治精㣲區别天下之良工哉辯書尹彦成問曰五運六氣是邪非邪曰大撓作甲子𨽻首作數志嵗月日時逺近耳故以當年為甲子歳冬至為甲子月朔為甲子日夜半為甲子時使嵗月日時積一十百千萬亦有條而不紊也配以五行位以五方皆人所為也嵗月日時甲子乙丑次第而及天地五行寒暑風雨倉卒而變人嬰所氣疾作於身氣難預期故疾難預定氣非人為故疾難人測推驗多舛拯救易誤俞扁弗議淳華未稽吾未見其是也曰素問之書成於黄岐運氣之宗起於素問將古聖喆妄邪曰尼父刪經三墳猶廢扁鵲盧出盧醫遂多尚有黄岐之醫籍乎後書之託名於聖喆也曰然則諸書不足信邪曰由漢而上有說無方由漢而下有方無說說不乖理方不違義雖出後學亦是良師固知君子之言不求貧朽然於武成之策亦取二三曰居今之世為古之工亦有道乎曰師友良醫因言而識變觀省舊典假筌以求魚博涉知病多診識脈屢用達藥則何愧於古人問子建平王妃姬等皆麗而無子擇良家未笄女入御又無子問曰求男有道乎澄對之曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲隂陽氣完實而後交合則交而孕孕而育育而為子堅壮強壽今未笄之女天癸始至已近男色隂氣蚤洩未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人謀置宮府有男之道也王曰善未再期生六男夫老陽遇少隂老隂遇少陽亦有子之道也褚氏遺書
