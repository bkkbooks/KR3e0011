body:
  text: 褚氏遺書醫家類提要臣等謹案褚氏遺書一卷舊題南齊褚澄撰澄字彦道陽翟人褚淵弟也尚宋文帝女廬江公主拜駙馬都尉入齊為吳郡太守官至左民尚書右軍將軍事迹具南齊書本傳是書分受形本氣平脈津潤分體精血除疾審微辨書問子十篇大㫖發揮人身氣血陰陽之奥宋史始著于録前有後唐清泰二年蕭淵序云黄巢時羣盜發塚得石刻棄之先人偶見載歸後遺命即以褚石為槨又有釋義堪序云石刻得之蕭氏塚中凡十有九片其一即蕭序也又有嘉泰元年丁介跋稱此書初得蕭氏父子䕶其石而始全繼得僧義堪筆之紙而始存今得劉義先鋟之木而始傳所云劉義先者亦不知何許人其書于靈樞素問之理頗有發明李時珍王肯堂俱采用之其論寡婦僧尼必有異乎妻妾之療發前人所未發而論吐血便血飲寒涼百不一生尤千古之龜鑒疑宋時精醫理者所著而偽托澄以傳其序跋當亦後人所附會然其言可采雖􅎓托不可廢也中頗論精血化生之理所以辨病源戒保嗇耳髙儒百川書志列之房中類則其悞甚矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀褚氏遺書原序黄巢造變從亂羣盜發人冢墓掘取金寳遇大穴焉方丈餘中環石十有八片形制如槨其盖穴石題曰有齊褚澄所歸啟盖棺骨已蛇蟻所穴環石内向文字曉然盜疑兵書移置穴外視之棄去先人偶見讀徹囑鄉鄰慎䕶明年具舟載歸欲送官以廣其傳遭時兵革不息先人亦不幸遺命異物終當化去神書理難乆藏其以褚石為吾棺槨之實隱則骸骨全褚石或興吾名亦顯淵募能者調墨治刻百本散之餘遵遺戒先人諱廣字叔常清泰二年五月十九日古揚蕭淵序靖康初金人入境羣盜乗間在處有之去揚城北三十五里陳源橋有蕭家世居其間葢貧不能自振矣守一冢甚勤曰吾十二世祖𦵏父於此吾家冢凡數百世世惟守此耳盜疑其起家者富而厚𦵏日夕窺之二家因語人曰吾十二世祖𦵏其父明經廣叔常用石刻秘經為槨從治遺命也已而不忍其柩有將發之兆遂敕子孫世守之耳窺者仍故二家因㑹鄉人啟視之漆棺如新刻石十有九片其一葢蕭淵序也乃移柩𦵏居側而舉石於門外有告蕭得埋寳者遂納石於今予時持鉢將為南嶽之逰過蕭門結𦵏縁適見其事謾録諸䇿以俟能者二年結制前五日衛國釋義堪書
